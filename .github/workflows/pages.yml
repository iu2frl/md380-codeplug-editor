name: Deploy Web App to GitHub Pages

on:
  release:
    types: [created]
  schedule:
    # Run every Monday at 03:00 UTC to refresh callsign database
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  tests:
    uses: ./.github/workflows/web-tests.yml

  build:
    needs: tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch callsign database
        run: |
          mkdir -p public
          curl -f -o public/user.csv https://database.radioid.net/static/user.csv || echo "Warning: Failed to fetch callsign database"
          echo "{\"updatedAt\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > public/callsign-meta.json

      - name: Build static site
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
